spring:
  application:
    name: rutina-backend

  datasource:
    url: ${DB_URL}?prepareThreshold=0
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# 제미나이 사용
#  ai:
#    google:
#      genai:
#        api-key: ${OPENAI_API_KEY}
#        chat:
#          options:
#            model: gemini-2.5-flash

# OpenAI 사용
  ai:
    model:
      chat: openai
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
  # ── 소셜 로그인 ──────────────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            scope: profile_nickname
            client-name: Kakao
            client-authentication-method: client_secret_post

          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            scope: nickname, email
            client-name: Naver

          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            authorization-grant-type: authorization_code
            scope: profile, email
            client-name: Google

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

server:
  # OAuth redirect_uri가 http://...가 아닌 https://rutina.co.kr/...로 생성되도록 필요합니다.
  forward-headers-strategy: framework

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 1800000       # 30분
  refresh-token-expiry: 604800000    # 7일

# ── 소셜 로그인 리다이렉트 URL (환경별로 분리) ────────────────
oauth2:
  redirect-url: ${OAUTH2_REDIRECT_URL:http://localhost:3000/oauth/callback}
