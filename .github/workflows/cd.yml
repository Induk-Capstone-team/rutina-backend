name: CD

on:
  push:
    branches:
      - main     # main 브랜치 push 시 자동 실행 (빌드 + 배포)
      - develop  # develop 브랜치 push 시 자동 실행 (빌드 + 배포)
    paths-ignore:
      - '**/*.md'  # .md 파일만 변경된 경우 워크플로우 실행 자체를 건너뜀

jobs:
  # =========================================
  # Job 1: 빌드 + Docker 이미지 생성 및 ghcr.io push
  # =========================================
  build:
    runs-on: ubuntu-latest  # GitHub이 제공하는 Ubuntu 환경에서 실행
    permissions:
      contents: read    # 레포 코드 읽기 권한
      packages: write   # ghcr.io에 Docker 이미지 push 권한

    steps:
      # 레포 코드를 Actions 실행 환경으로 가져옴
      - name: Checkout
        uses: actions/checkout@v4

      # JDK 21 설치 (Gradle 빌드에 필요)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # gradlew 실행 권한 부여 (Linux 환경에서 필요)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Gradle로 JAR 파일 빌드
      # Dockerfile 안에서도 빌드하지만, 여기서 먼저 실행해서 빌드 에러를 빠르게 확인
      - name: Build with Gradle
        run: ./gradlew bootJar --no-daemon

      # ghcr.io(GitHub Container Registry) 로그인
      # GITHUB_TOKEN은 GitHub이 자동으로 제공
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker 이미지 빌드 후 ghcr.io에 push
      # 태그를 브랜치명으로 지정:
      #   main   push → ghcr.io/induk-capstone-team/rutina-backend:main
      #   develop push → ghcr.io/induk-capstone-team/rutina-backend:develop
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/induk-capstone-team/rutina-backend:${{ github.ref_name }}

  # =========================================
  # Job 2: 서버에 배포
  # build job이 성공해야 실행됨 (needs: build)
  # =========================================
  deploy:
    needs: build  # build job 완료 후 실행
    runs-on: ubuntu-latest

    steps:
      # Lightsail 서버에 SSH 접속하여 배포 스크립트 실행
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}      # Lightsail 서버 IP
          username: ubuntu                          # SSH 접속 유저
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}    # SSH 개인키 (.pem 파일 내용)
          # 서버의 작업 디렉토리로 이동
          # ghcr.io에서 최신 이미지 pull
          # 컨테이너 재시작 (-d: 백그라운드 실행)
          # 사용하지 않는 이미지 삭제 (서버 디스크 공간 확보)
          script: |
            cd /home/ubuntu/rutina
            docker compose pull app
            docker compose up -d
            docker image prune -f