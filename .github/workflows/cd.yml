name: CD

on:
  push:
    branches:
      - main     # main 브랜치 push 시 자동 실행 (빌드 + 배포)
      - develop  # develop 브랜치 push 시 자동 실행 (빌드 + 배포)
    paths-ignore:
      - '**/*.md'  # .md 파일만 변경된 경우 워크플로우 실행 자체를 건너뜀

jobs:
  # =========================================
  # Job 1: Docker 이미지 생성 및 ghcr.io push
  # bootJar는 Dockerfile 멀티 스테이지 빌드에서 실행됨
  # CI에서 이미 검증된 코드가 머지된 이후 실행되므로 중복 빌드 불필요
  # =========================================
  build:
    runs-on: ubuntu-latest  # GitHub이 제공하는 Ubuntu 환경에서 실행
    permissions:
      contents: read    # 레포 코드 읽기 권한
      packages: write   # ghcr.io에 Docker 이미지 push 권한

    steps:
      # 레포 코드를 Actions 실행 환경으로 가져옴
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/induk-capstone-team/rutina-backend:${{ github.ref_name }}

  # =========================================
  # Job 2: 서버에 .env 생성 후 배포
  # =========================================
  deploy:
    needs: build  # build job 완료 후 실행
    runs-on: ubuntu-latest

    steps:
      # ENV_FILE Secret 내용을 Actions runner에 .env로 기록 후 서버로 전송
      # 환경변수 추가/수정/삭제는 GitHub Secrets의 ENV_FILE만 편집하면 됨 (cd.yml 수정 불필요)
      - name: Write .env from secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Copy .env to Lightsail
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: ".env"
          target: "/home/ubuntu/rutina/"

      # Lightsail 서버에 SSH 접속하여 배포 스크립트 실행
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}      # Lightsail 서버 IP
          username: ubuntu                          # SSH 접속 유저
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}    # SSH 개인키 (.pem 파일 내용)
          # 서버의 작업 디렉토리로 이동
          # ghcr.io에서 최신 이미지 pull
          # 컨테이너 재시작 (-d: 백그라운드 실행)
          # 사용하지 않는 이미지 삭제 (서버 디스크 공간 확보)
          script: |
            cd /home/ubuntu/rutina
            docker compose pull app
            docker compose up -d
            docker image prune -f